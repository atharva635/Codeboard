# ============================================
# CodeBoard - Backend Deployment
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: codeboard
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: codeboard-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: codeboard-config
          env:
            - name: PORT
              value: "5000"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: codeboard-secrets
                  key: db-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: codeboard-secrets
                  key: jwt-secret
            - name: JWT_EXPIRES_IN
              value: "7d"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: codeboard
spec:
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 5000
  type: ClusterIP
