# ============================================
# CodeBoard - Kubernetes Secrets
# Base64 encode your values before applying
# echo -n 'your-value' | base64
# ============================================
apiVersion: v1
kind: Secret
metadata:
  name: codeboard-secrets
  namespace: codeboard
type: Opaque
data:
  # base64 encoded values (replace these!)
  db-password: Y29kZWJvYXJkX3Bhc3M=        # codeboard_pass
  jwt-secret: Y2hhbmdlLXRoaXMtc2VjcmV0     # change-this-secret
  github-token: ""                            # your GitHub token (base64)
