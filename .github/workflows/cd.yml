# ============================================
# CodeBoard CD Pipeline
# Builds and pushes Docker images on main merge
# ============================================

name: CD Pipeline

on:
  push:
    branches: [main]
    tags: ['v*']

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image prefix (lowercase)
        id: repo
        run: echo "image_prefix=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/codeboard" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      # Backend
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.repo.outputs.image_prefix }}-backend:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.repo.outputs.image_prefix }}-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Worker
      - name: Build & Push Worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.repo.outputs.image_prefix }}-worker:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.repo.outputs.image_prefix }}-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Frontend
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.repo.outputs.image_prefix }}-frontend:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.repo.outputs.image_prefix }}-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### 🚀 Images pushed successfully!" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: \`${{ env.REGISTRY }}/${{ steps.repo.outputs.image_prefix }}-backend:${{ steps.meta.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Worker: \`${{ env.REGISTRY }}/${{ steps.repo.outputs.image_prefix }}-worker:${{ steps.meta.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: \`${{ env.REGISTRY }}/${{ steps.repo.outputs.image_prefix }}-frontend:${{ steps.meta.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
